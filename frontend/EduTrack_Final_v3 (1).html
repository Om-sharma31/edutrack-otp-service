<body>
<div id="app"></div>

<script>
// ── Backend Configuration ──────────────────────────────────────────────────
// Change this URL if your Spring Boot server runs on a different port/host
const OTP_SERVER = 'http://localhost:8080';

// ── Backend status tracking ────────────────────────────────────────────────
let backendOnline = null; // null=unknown, true=up, false=down
let otpMode = 'register'; // 'register' | 'login'  — controls what otp-verify does
let loginTab = 'student'; // 'student' | 'staff' | 'admin'  — active tab on login page

async function checkBackendHealth() {
  try {
    const res = await fetch(`${OTP_SERVER}/api/otp/health`, { signal: AbortSignal.timeout(3000) });
    backendOnline = res.ok;
  } catch {
    backendOnline = false;
  }
  // Re-render status badge if visible
  const badge = document.getElementById('backend-status');
  if (badge) updateStatusBadge(badge);
}

function updateStatusBadge(badge) {
  if (backendOnline === true) {
    badge.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--success);margin-right:6px;vertical-align:middle"></span>OTP Server Online';
    badge.style.background = 'var(--success-bg)';
    badge.style.color = 'var(--success)';
    badge.style.borderColor = '#a7f3d0';
  } else if (backendOnline === false) {
    badge.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger);margin-right:6px;vertical-align:middle"></span>OTP Server Offline — <a href="#" onclick="checkBackendHealth();return false;" style="color:inherit;font-weight:700">Retry</a>';
    badge.style.background = 'var(--danger-bg)';
    badge.style.color = 'var(--danger)';
    badge.style.borderColor = '#fecaca';
  } else {
    badge.innerHTML = '⏳ Checking OTP Server…';
    badge.style.background = 'var(--warning-bg)';
    badge.style.color = 'var(--warning)';
    badge.style.borderColor = '#fde68a';
  }
}

// ── Registered users persistence (localStorage) ────────────────────────────
function loadRegisteredUsers() {
  try { return JSON.parse(localStorage.getItem('edutrack_users') || '[]'); } catch { return []; }
}
async function saveRegisteredUser(user) {
  try {
    await fetch(`${OTP_SERVER}/api/db/users`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(user)
    });
  } catch(e) { console.warn('DB save failed, localStorage fallback'); }
  const users = loadRegisteredUsers();
  const existing = users.findIndex(u => u.email === user.email);
  if (existing >= 0) users[existing] = user; else users.push(user);
  localStorage.setItem('edutrack_users', JSON.stringify(users));
}

async function loadUserFromDB(email) {
  try {
    const res = await fetch(`${OTP_SERVER}/api/db/users/email/${encodeURIComponent(email)}`, {
      signal: AbortSignal.timeout(5000)
    });
    const data = await res.json();
    if (data.success) return data.user;
  } catch(e) { console.warn('loadUserFromDB failed:', e.message); }
  return null;
}

// ── Load all user data from PostgreSQL ─────────────────────────────────────
async function loadUserDataFromDB(userId) {
  try {
    // Load reviews
    try {
      const revRes = await fetch(`${OTP_SERVER}/api/db/reviews/${userId}`,{signal:AbortSignal.timeout(4000)});
      if(revRes.ok){
        const revData = await revRes.json();
        if(Array.isArray(revData)) {
          DB.reviews[userId] = revData.map(r => ({
            teacher: r.teacherName||'Teacher',
            subject: r.subject||'General',
            text: r.reviewText||'',
            type: r.reviewType||'positive',
            date: r.createdAt ? new Date(r.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : ''
          }));
        }
      }
    } catch(e) { console.warn('Reviews load failed:', e.message); }
    try {
      const markRes = await fetch(`${OTP_SERVER}/api/db/marks/${userId}`,{signal:AbortSignal.timeout(4000)});
      if(markRes.ok){ const markData = await markRes.json(); if(Array.isArray(markData)) DB.dbMarks = markData; }
    } catch(e) { console.warn('Marks load failed:', e.message); }
    try {
      const attRes = await fetch(`${OTP_SERVER}/api/db/attendance/${userId}`,{signal:AbortSignal.timeout(4000)});
      if(attRes.ok){ const attData = await attRes.json(); if(Array.isArray(attData)) DB.dbAttendance = attData; }
    } catch(e) { console.warn('Attendance load failed:', e.message); }
  } catch(e) { console.warn('Could not load user data from DB', e); }
}

// ── Auto-login from localStorage session ──────────────────────────────────
async function tryAutoLogin() {
  const saved = localStorage.getItem('edutrack_session');
  if(!saved) return false;
  try {
    const user = JSON.parse(saved);
    if(!user) return false;
    // Admin auto-login — no DB lookup needed
    if(user.role==='admin'&&user.id==='ADMIN-001'){
      currentUser=user;
      await loadAllDataFromServer();
      currentStep='dashboard';selectedTab='dashboard';render();
      showToast('Welcome back, Admin!');
      return true;
    }
    if(!user.email) return false;
    // Quick local restore first — don't wait for DB
    const localUsers = loadRegisteredUsers();
    const localUser = localUsers.find(u => u.email === user.email);
    // Verify user still exists in DB
    const dbUser = await loadUserFromDB(user.email);
    if(dbUser) {
      currentUser = dbUser;
      // Restore teacherSchedule from localStorage if backend doesn't have it yet
      if(currentUser.role==='teacher'&&!currentUser.teacherSchedule){
        try{var lsParsed=JSON.parse(saved);if(lsParsed.teacherSchedule){currentUser.teacherSchedule=lsParsed.teacherSchedule;}}catch(e){}
      }
      // Load all school data (students, teachers, assignments, marks, attendance)
      await loadAllDataFromServer();
      await loadUserDataFromDB(dbUser.id);
      // Hydrate teacherSchedule into DB.teachers entry
      if(currentUser.role==='teacher'&&currentUser.teacherSchedule){
        var tEntry=DB.teachers.find(function(t){return t.email===currentUser.email;});
        if(tEntry)tEntry.teacherSchedule=currentUser.teacherSchedule;
      }
      // Ensure current user is in DB.students (if student role)
      if(currentUser.role === 'student') {
        if(!DB.students.find(s => s.id === currentUser.id)) {
          DB.students.push({
            name: currentUser.name, email: currentUser.email,
            id: currentUser.id, class: dbUser.className || '9',
            section: dbUser.section || 'A', rollNo: dbUser.rollNo || 1,
            schoolCode: currentUser.schoolCode || '', marks: {}
          });
        }
      }
      currentStep = 'dashboard'; selectedTab = 'profile';
      render();
      showToast('Welcome back, ' + currentUser.name + '!');
      return true;
    }
  } catch(e) {}
  localStorage.removeItem('edutrack_session');
  return false;
}

// ── Reviews persistence (localStorage) ────────────────────────────────────
function loadReviews() {
  try { return JSON.parse(localStorage.getItem('edutrack_reviews') || '{}'); } catch { return {}; }
}
function saveReviews(reviews) {
  localStorage.setItem('edutrack_reviews', JSON.stringify(reviews));
}

// ── Assignments/Notices store ─────────────────────────────────────────────
function loadAssignments(){
  try{ return JSON.parse(localStorage.getItem('edutrack_assignments')||'null'); } catch{ return null; }
}
function saveAssignmentsLocal(arr){ localStorage.setItem('edutrack_assignments', JSON.stringify(arr)); }

// Seed demo data if nothing in localStorage

// ── Load all school data from PostgreSQL ───────────────────────────────────
// Called on every login. Populates DB.students, DB.teachers, ASSIGNMENTS
// from the real database. Falls back gracefully if backend is offline.
async function loadAllDataFromServer() {
  const timeout = { signal: AbortSignal.timeout(6000) };
  const schoolCode = currentUser ? (currentUser.schoolCode || '') : '';
  const qs = schoolCode ? '?schoolCode=' + encodeURIComponent(schoolCode) : '';

  // ── Students ──────────────────────────────────────────────────────────────
  try {
    const res = await fetch(`${OTP_SERVER}/api/db/students${qs}`, timeout);
    if (res.ok) {
      const list = await res.json();
      if (Array.isArray(list) && list.length > 0) {
        // Merge server students into DB.students, keeping any existing marks
        list.forEach(srv => {
          const idx = DB.students.findIndex(s => s.id === srv.id);
          if (idx >= 0) {
            // Update profile fields but keep locally loaded marks
            DB.students[idx] = { ...DB.students[idx], ...srv };
          } else {
            DB.students.push({ marks: {}, ...srv });
          }
        });
        console.log('[EduTrack] Loaded', list.length, 'students from DB');
      }
    }
  } catch(e) { console.warn('[EduTrack] Students load failed:', e.message); }

  // ── Teachers ──────────────────────────────────────────────────────────────
  try {
    const res = await fetch(`${OTP_SERVER}/api/db/teachers${qs}`, timeout);
    if (res.ok) {
      const list = await res.json();
      if (Array.isArray(list) && list.length > 0) {
        DB.teachers = list;
        console.log('[EduTrack] Loaded', list.length, 'teachers from DB');
      }
    }
  } catch(e) { console.warn('[EduTrack] Teachers load failed:', e.message); }

  // ── Assignments ───────────────────────────────────────────────────────────
  try {
    const res = await fetch(`${OTP_SERVER}/api/db/assignments`, timeout);
    if (res.ok) {
      const list = await res.json();
      if (Array.isArray(list) && list.length > 0) {
        // Server assignments take priority; merge with any local-only ones
        const serverIds = new Set(list.map(a => a.id));
        const localOnly = ASSIGNMENTS.filter(a => !serverIds.has(a.id));
        ASSIGNMENTS = [...list, ...localOnly];
        saveAssignmentsLocal(ASSIGNMENTS);
        console.log('[EduTrack] Loaded', list.length, 'assignments from DB');
      }
    }
  } catch(e) { console.warn('[EduTrack] Assignments load failed:', e.message); }

  // ── Current user's marks (formatted) ─────────────────────────────────────
  if (currentUser && currentUser.role === 'student') {
    try {
      const res = await fetch(`${OTP_SERVER}/api/db/marks/${currentUser.id}/formatted`, timeout);
      if (res.ok) {
        const data = await res.json();
        if (data.success && data.marks && Object.keys(data.marks).length > 0) {
          const stu = DB.students.find(s => s.id === currentUser.id);
          if (stu) { stu.marks = data.marks; }
          console.log('[EduTrack] Loaded marks for', currentUser.name);
        }
      }
    } catch(e) { console.warn('[EduTrack] Marks load failed:', e.message); }

    // ── Current user's attendance (formatted) ──────────────────────────────
    try {
      const res = await fetch(`${OTP_SERVER}/api/db/attendance/${currentUser.id}/formatted`, timeout);
      if (res.ok) {
        const data = await res.json();
        if (data.success && data.attendance) {
          DB.attendance[currentUser.id] = data.attendance;
          console.log('[EduTrack] Loaded attendance for', currentUser.name);
        }
      }
    } catch(e) { console.warn('[EduTrack] Attendance load failed:', e.message); }
  }
}

function genMarks(){
  const m={};
  const tests=['W1','W2','W3','W4','W5','Mid-Year','Final'];
  SUBJECTS.forEach(sub=>{
    m[sub]={};
    tests.forEach(t=>{
      const max=t.startsWith('W')?25:t==='Mid-Year'?50:100;
      m[sub][t]=Math.round(max*(.45+Math.random()*.55));
      m[sub][max+'_max']=max;
    });
    m[sub].max_weekly=25;m[sub].max_mid=50;m[sub].max_final=100;
  });
  return m;
}

function genAttendance(studentId){
  const a={};
  for(let w=1;w<=12;w++){
    a[`Week ${w}`]={};
    DAYS.forEach(d=>{
      const r=Math.random();
      a[`Week ${w}`][d]=r<.85?'present':r<.93?'late':'absent';
    });
  }
  return a;
}

    ?['Profile','Timetable','My Marks','Teacher Reviews','Attendance','Assignments','Updates','Payments','Academic Calendar']
    :['Profile','Timetable','My Marks','Teacher Reviews','Attendance','Assignments','Updates','Academic Calendar'];
  var navBg=isAdmin?'style="background:linear-gradient(135deg,#1e293b,#334155)"':'';
  return `
    <div id="dashboard-page" style="display:flex;flex-direction:column;min-height:100vh">

    </div>`;
}

function renderTabContent(){
  const isTeacher=currentUser&&currentUser.role==='teacher';
  const isAdmin=currentUser&&currentUser.role==='admin';
  // Admin tabs
  if(isAdmin&&selectedTab==='dashboard')return renderAdminDashboard();
  if(isAdmin&&selectedTab==='add_student')return renderAdminAddStudent();
  if(isAdmin&&selectedTab==='manage_students')return renderAdminManageStudents();
  if(isAdmin&&selectedTab==='manage_teachers')return renderAdminManageTeachers();
  if(isAdmin&&selectedTab==='notices')return renderAdminNotices();
  if(isAdmin&&selectedTab==='fee_records')return renderAdminFeeRecords();
  if(isAdmin&&selectedTab==='system')return renderAdminSystem();
  // Regular tabs
  if(selectedTab==='profile')return renderProfile();
  if(selectedTab==='timetable')return renderTimetable();
  if(!isTeacher&&selectedTab==='my_marks')return renderMarks();
  if(!isTeacher&&selectedTab==='teacher_reviews')return renderStudentReviews();
  if(!isTeacher&&selectedTab==='attendance')return renderAttendance();
  if(isTeacher&&selectedTab==='write_review')return renderWriteReview();
  if(isTeacher&&selectedTab==='class_performance')return renderClassPerformance();
  if(isTeacher&&selectedTab==='post_assignment')return renderPostAssignment();
  if(isTeacher&&selectedTab==='manage_students')return renderManageStudents();
  if(isTeacher&&selectedTab==='attendance')return renderTeacherAttendance();
  if(selectedTab==='academic_calendar')return renderAcademicCalendar();
  if(selectedTab==='payments')return renderPayments();
  if(!isTeacher&&selectedTab==='assignments')return renderAssignments();
  if(!isTeacher&&selectedTab==='updates')return renderUpdates();
  return '<p style="color:var(--text3);padding:40px">Coming soon...</p>';
}

// Get the effective student — either the logged-in student or their child (for parents)
function getEffectiveStudent(){
  if(currentUser&&currentUser.role==='parent') return getChildStudent();
  return DB.students.find(s=>s.email===currentUser.email||s.id===currentUser.id)||null;
}

function renderTimetable(){
  const isTeacher=currentUser&&currentUser.role==='teacher';
  const stu=!isTeacher?getEffectiveStudent():null;
  const tch=isTeacher?DB.teachers.find(function(t){return t.email===currentUser.email;}):null;

  if(isTeacher){
    var tchSubject=tch?tch.subject:'';
    var tchClasses=tch&&tch.classes&&tch.classes.length?tch.classes:[];

    if(!tchSubject||!tchClasses.length){
      return '<div class="section-header"><div><div class="section-title">My Timetable</div><div class="section-sub">Your personal teaching schedule</div></div></div>'
        +'<div class="card" style="text-align:center;padding:40px;color:var(--text2)">'
        +'<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;color:var(--text3)"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>'
        +'<div style="font-weight:600;margin-bottom:6px">Teaching setup not completed</div>'
        +'<div style="font-size:13px">Go to the <b>Profile</b> tab, select your subject and class-sections, then click Save Setup.</div>'
        +'</div>';
    }

    // Build grid: distribute assigned classes evenly across subject slots
    // Step 1 — collect all (dayIdx, periodIdx) slots where subject appears in the reference timetable
    var refKey=Object.keys(TIMETABLE)[0]||'6A';
    var subjectSlots=[];
    for(var di2=0;di2<DAYS.length;di2++){
      for(var pi2=0;pi2<TIMES.length;pi2++){
        if(TIMETABLE[refKey]&&TIMETABLE[refKey][DAYS[di2]]&&TIMETABLE[refKey][DAYS[di2]][pi2]===tchSubject){
          subjectSlots.push(di2+'_'+pi2);
        }
      }
    }
    // Step 2 — assign each class to slots in round-robin so all classes appear
    var slotMap={};
    subjectSlots.forEach(function(key,idx){
      slotMap[key]=tchClasses[idx % tchClasses.length];
    });
    // Class colour palette so each assigned class gets a distinct colour
    var classColors=['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4'];
    var classColorMap={};
    tchClasses.forEach(function(c,i){classColorMap[c]=classColors[i%classColors.length];});

    var rows = (function(){
      var html='';
      for(var i=0;i<TIMES.length;i++){
        html+='<div class="tt-row"><div class="tt-time">'+TIMES[i]+'</div>';
        for(var di=0;di<DAYS.length;di++){
          var key=di+'_'+i;
          var assigned=slotMap[key]||'';
          if(assigned){
            var color=classColorMap[assigned]||'var(--brand)';
            html+='<div class="tt-sub"><div style="background:'+color+'18;color:'+color+';border:1.5px solid '+color+'40;border-radius:5px;padding:4px 8px;font-size:12px;font-weight:700;text-align:center">Class '+assigned+'<div style="font-size:10px;font-weight:400">'+tchSubject+'</div></div></div>';
          } else {
            html+='<div class="tt-sub"><span style="color:var(--text3);font-size:12px">—</span></div>';
          }
        }
        html+='</div>';
      }
      return html;
    })();

    var headCols=DAYS.map(function(d){return '<div class="tt-cell">'+d.slice(0,3)+'</div>';}).join('');

    return '<div class="section-header">'
      +'<div><div class="section-title">My Timetable</div><div class="section-sub">Your personal teaching schedule &mdash; '+tchSubject+'</div></div>'
      +'<span class="badge badge-blue">'+tchClasses.length+' class'+(tchClasses.length>1?'es':'')+'</span>'
      +'</div>'
      +'<div class="card" style="padding:0;overflow:hidden">'
      +'<div class="timetable-grid">'
      +'<div class="tt-head"><div class="tt-cell">Time</div>'+headCols+'</div>'
      +rows
      +'</div></div>'
      +'<div class="card" style="margin-top:16px">'
      +'<div style="font-weight:700;margin-bottom:12px;font-size:14px">Your Assigned Classes</div>'
      +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
      +tchClasses.map(function(c){return '<div style="background:var(--brand-light);color:var(--brand);padding:8px 18px;border-radius:var(--radius);font-weight:600;font-size:13px">Class '+c+'</div>';}).join('')
      +'</div></div>';
  }

  // Student / parent view
  const classKey=stu?stu.class+stu.section:'6A';
  const tt=TIMETABLE[classKey]||TIMETABLE['6A'];
  return `
    <div class="section-header">
      <div><div class="section-title">Timetable</div><div class="section-sub">Class ${classKey} weekly schedule</div></div>
      <span class="badge badge-blue">Class ${classKey}</span>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="timetable-grid">
        <div class="tt-head">
          <div class="tt-cell">Time</div>
          ${DAYS.map(function(d){return '<div class="tt-cell">'+d.slice(0,3)+'</div>';}).join('')}
        </div>
        ${(function(){return TIMES.map(function(time,i){
          var cells=DAYS.map(function(d){return '<div class="tt-sub">'+subPill((tt[d]||[])[i]||'Free')+'</div>';}).join('');
          return '<div class="tt-row"><div class="tt-time">'+time+'</div>'+cells+'</div>';
        }).join('');})()}
      </div>
    </div>
  `;
}

function downloadReportCard(stuId){
  var stu=DB.students.find(function(s){return s.id===stuId;})||getEffectiveStudent();
  if(!stu||!stu.marks||!Object.keys(stu.marks).length){showToast('No marks data available.');return;}
  var lines=['<html><head><meta charset=UTF-8><title>Report Card</title>'];
  lines.push('<style>body{font-family:Arial,sans-serif;padding:30px;max-width:800px;margin:auto}');
  lines.push('h1{background:#1a56db;color:#fff;padding:20px 30px;margin:-30px -30px 24px}');
  lines.push('table{width:100%;border-collapse:collapse;margin:16px 0}');
  lines.push('th{background:#1a56db;color:#fff;padding:9px 12px;text-align:left}');
  lines.push('td{padding:9px 12px;border-bottom:1px solid #e2e8f0}');
  lines.push('tr:nth-child(even){background:#f8fafc}');
  lines.push('.info{display:flex;gap:30px;background:#f8fafc;padding:14px 20px;border-radius:8px;margin-bottom:20px;font-size:14px}');
  lines.push('.lbl{color:#64748b;font-size:11px;text-transform:uppercase;font-weight:600;display:block;margin-bottom:2px}');
  lines.push('.noprint{text-align:center;margin-bottom:20px}');
  lines.push('@media print{.noprint{display:none}}<\/style><\/head><body>');
  lines.push('<div class=noprint><button onclick="window.print()" style="background:#1a56db;color:#fff;border:none;padding:10px 26px;border-radius:7px;font-size:14px;cursor:pointer">Print / Save as PDF</button></div>');
  lines.push('<h1>EduTrack School &mdash; Report Card &mdash; 2024-2025</h1>');
  lines.push('<div class=info>');
  lines.push('<div><span class=lbl>Student</span>'+stu.name+'</div>');
  lines.push('<div><span class=lbl>Class</span>'+(stu.class||'')+(stu.section||'')+'</div>');
  lines.push('<div><span class=lbl>Roll No</span>'+(stu.rollNo||'N/A')+'</div>');
  lines.push('<div><span class=lbl>ID</span>'+(stu.id||'')+'</div>');
  lines.push('</div>');
  lines.push('<table><thead><tr><th>Subject</th><th>Weekly Avg/25</th><th>Mid-Year/50</th><th>Final/100</th><th>%</th><th>Grade</th><th>Result</th></tr></thead><tbody>');
  var total=0,count=0,allPass=true;
  SUBJECTS.forEach(function(sub){
    var m=stu.marks[sub];
    if(!m)return;
    var ws=[m.W1,m.W2,m.W3,m.W4,m.W5].filter(Boolean);
    var wa=ws.length?Math.round(ws.reduce(function(a,b){return a+b;},0)/ws.length):0;
    var fp=Math.round((m['Final']/100)*100);
    var gr=fp>=90?'A+':fp>=80?'A':fp>=70?'B+':fp>=60?'B':fp>=50?'C':'D';
    var pass=fp>=33;
    if(!pass)allPass=false;
    total+=fp;count++;
    lines.push('<tr>');
    lines.push('<td><b>'+sub+'</b></td>');
    lines.push('<td style="text-align:center">'+wa+'</td>');
    lines.push('<td style="text-align:center">'+(m['Mid-Year']||0)+'</td>');
    lines.push('<td style="text-align:center;font-weight:700">'+(m['Final']||0)+'</td>');
    lines.push('<td style="text-align:center">'+fp+'%</td>');
    lines.push('<td style="text-align:center"><b>'+gr+'</b></td>');
    lines.push('<td style="text-align:center;color:'+(pass?'#059669':'#dc2626')+';font-weight:700">'+(pass?'Pass':'Fail')+'</td>');
    lines.push('</tr>');
  });
  var op=count?Math.round(total/count):0;
  var og=op>=90?'A+':op>=80?'A':op>=70?'B+':op>=60?'B':op>=50?'C':'D';
  var res=allPass&&op>=33?'PASSED':'FAILED';
  lines.push('</tbody></table>');
  lines.push('<div style="background:'+(res==='PASSED'?'#d1fae5':'#fee2e2')+';border-radius:8px;padding:16px 20px;font-size:16px;font-weight:700;color:'+(res==='PASSED'?'#065f46':'#991b1b')+'">');
  lines.push('Overall: '+op+'% &nbsp;|&nbsp; Grade: '+og+' &nbsp;|&nbsp; Result: '+res+'</div>');
  lines.push('<p style="color:#94a3b8;font-size:11px;margin-top:24px">Generated by EduTrack &mdash; '+new Date().toLocaleDateString()+'</p>');
  lines.push('<\/body><\/html>');
  var blob=new Blob([lines.join('')],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var win=window.open(url,'_blank');
  if(!win){showToast('Pop-up blocked - allow pop-ups for this site.');}
}

function fmtPostDate(ds){
  if(!ds)return'';
  return new Date(ds).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}
function daysLeftBadge(ds){
  if(!ds)return'';
  const diff=Math.ceil((new Date(ds)-new Date())/(1000*60*60*24));
  if(diff<0) return'<span style="color:var(--danger);font-size:11px;font-weight:600">Overdue</span>';
  if(diff===0)return'<span style="color:var(--danger);font-size:11px;font-weight:700">Due Today!</span>';
  if(diff<=2) return`<span style="color:var(--warning);font-size:11px;font-weight:600">Due in ${diff} day${diff>1?'s':''}</span>`;
  return`<span style="color:var(--text3);font-size:11px">Due: ${fmtPostDate(ds)}</span>`;
}

function renderClassPerformance(){
  const tch=DB.teachers.find(t=>t.email===currentUser.email);
  const classes=tch?tch.classes:['6A','6B'];
  const stuList=selectedClass?DB.students.filter(s=>s.class+s.section===selectedClass):[];
  let classAvg=0;
  if(stuList.length){
    const totals=stuList.map(s=>{
      let sum=0,cnt=0;
      Object.values(s.marks).forEach(m=>{sum+=getPct(m['Final'],m.max_final);cnt++;});
      return cnt?Math.round(sum/cnt):0;
    });
    classAvg=Math.round(totals.reduce((a,b)=>a+b,0)/totals.length);
  }
  return `
    <div class="section-header">
      <div><div class="section-title">Class Performance</div><div class="section-sub">View average and individual student scores</div></div>
    </div>
    <div style="display:grid;grid-template-columns:200px 1fr;gap:20px;align-items:start">
      <div class="card">
        <div style="font-weight:700;font-size:13px;margin-bottom:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">Classes</div>
        ${classes.map(c=>`
          <div class="class-card card ${selectedClass===c?'selected':''}" data-cls="${c}" style="margin-bottom:8px;padding:12px 16px;cursor:pointer">
            <div style="font-weight:600">Class ${c}</div>
            <div style="font-size:11px;color:var(--text3)">${DB.students.filter(s=>s.class+s.section===c).length} students</div>
          </div>`).join('')}
      </div>
      <div>
        ${selectedClass&&stuList.length?`
        <div class="grid3" style="margin-bottom:20px">
          <div class="stat-card"><div class="stat-num">${classAvg}%</div><div class="stat-label">Class Average</div></div>
          <div class="stat-card"><div class="stat-num">${stuList.length}</div><div class="stat-label">Total Students</div></div>
          <div class="stat-card"><div class="stat-num">${stuList.filter(s=>{let t=0,c=0;Object.values(s.marks).forEach(m=>{t+=getPct(m['Final'],m.max_final);c++;});return c&&Math.round(t/c)>=60}).length}</div><div class="stat-label">Passing Students</div></div>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <table class="marks-table">
            <thead><tr>
              <th>Student</th>
              ${SUBJECTS.map(s=>`<th style="text-align:center;font-size:10px">${s.split(' ')[0]}</th>`).join('')}
              <th style="text-align:center">Avg</th>
              <th>Grade</th>
            </tr></thead>
            <tbody>
              ${stuList.map(s=>{
                let sum=0,cnt=0;
                const subScores=SUBJECTS.map(sub=>{
                  const pct=getPct(s.marks[sub]['Final'],s.marks[sub].max_final);
                  sum+=pct;cnt++;
                  return pct;
                });
                const avg=Math.round(sum/cnt);
                const gr=getGrade(avg);
                return `<tr>
                  <td>
                    <div style="display:flex;align-items:center;gap:8px">
                      <div class="avatar" style="width:26px;height:26px;font-size:10px;flex-shrink:0">${getInitials(s.name)}</div>
                      <div>
                        <div style="font-weight:500;font-size:12px">${s.name}</div>
                        <div style="font-size:10px;color:var(--text3)">Roll ${s.rollNo}</div>
                      </div>
                    </div>
                  </td>
                  ${subScores.map(p=>`<td style="text-align:center;font-size:12px;font-weight:600;color:${p>=70?'var(--success)':p>=50?'var(--warning)':'var(--danger)'}">${p}%</td>`).join('')}
                  <td style="text-align:center;font-weight:700">${avg}%</td>
                  <td><span class="badge badge-${gr.c==='green'?'green':gr.c==='blue'?'blue':gr.c==='amber'?'amber':'red'}">${gr.g}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>` : `
        <div class="card">
          <div class="empty-state">
            <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <div style="font-size:15px;font-weight:600;color:var(--text2)">Select a class</div>
            <div style="font-size:13px;margin-top:4px">Choose a class from the left panel to view performance data.</div>
          </div>
        </div>`}
      </div>
    </div>
  `;
}

function attachEvents(){
  const q=id=>document.getElementById(id);
  function on(id,ev,fn){const el=q(id);if(el)el.addEventListener(ev,fn)}

  // Show/hide Child ID field based on role selection
  const roleSelect = q('r-role');
  if(roleSelect){
    roleSelect.addEventListener('change', function(){
      const childWrap = q('child-id-wrap');
      if(childWrap) childWrap.style.display = (this.value === 'parent') ? '' : 'none';
    });
  }

  // ── Login tab switchers ────────────────────────────────────────────────────
  on('tab-student','click',function(){loginTab='student';render();var b=q('backend-status');if(b&&backendOnline!==null)updateStatusBadge(b);});
  on('tab-staff','click',function(){loginTab='staff';render();var b=q('backend-status');if(b&&backendOnline!==null)updateStatusBadge(b);});
  on('tab-admin','click',function(){loginTab='admin';render();});

  // ── Admin login (password only) ───────────────────────────────────────────
  on('admin-login-btn','click',function(){
    var pass=(q('admin-login-pass')||{}).value||'';
    if(!pass){showToast('Enter the admin password');return;}
    if(pass==='2005'){
      currentUser={name:'School Admin',role:'admin',id:'ADMIN-001',email:'admin@edutrack.local'};
      localStorage.setItem('edutrack_session',JSON.stringify(currentUser));
      loadAllDataFromServer();
      currentStep='dashboard';selectedTab='dashboard';render();
      showToast('Welcome, Admin!');
    } else {
      showToast('Incorrect admin password');
      var btn=q('admin-login-btn');if(btn){btn.textContent='Access Admin Panel →';}
    }
  });

  // ── Student login (Roll No + Password) ────────────────────────────────────
  on('stu-login-btn','click',async function(){
    var cls=(q('stu-login-class')||{}).value||'';
    var sec=(q('stu-login-section')||{}).value||'';
    var roll=(q('stu-login-roll')||{}).value||'';
    var pass=(q('stu-login-pass')||{}).value||'';
    if(!cls||!sec||!roll||!pass){showToast('Please fill in all fields');return;}
    var btn=q('stu-login-btn');
    if(btn){btn.disabled=true;btn.textContent='Signing in…';}
    try {
      var res=await fetch(OTP_SERVER+'/api/auth/student-login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({className:cls,section:sec,rollNo:parseInt(roll),password:pass,schoolCode:''}),
        signal:AbortSignal.timeout(8000)
      });
      var data=await res.json();
      if(data.success&&data.user){
        currentUser=data.user;
        localStorage.setItem('edutrack_session',JSON.stringify(data.user));
        await loadAllDataFromServer();
        if(!DB.students.find(function(s){return s.id===data.user.id;})){
          DB.students.push({name:data.user.name,email:data.user.email||'',id:data.user.id,
            class:data.user.class||cls,section:data.user.section||sec,
            rollNo:data.user.rollNo||parseInt(roll),schoolCode:data.user.schoolCode||'',marks:{}});
        }
        currentStep='dashboard';selectedTab='profile';render();
        showToast('Welcome back, '+data.user.name+'!');
      } else {
        showToast(data.message||'Login failed');
        if(btn){btn.disabled=false;btn.textContent='Sign In →';}
      }
    } catch(err) {
      console.error('Student login error:',err);
      // Offline demo fallback: class 9 / section A / roll 1 / any password
      if(cls==='9'&&sec==='A'&&roll==='1'){
        var demoStu=DB.students[0]||{name:'Demo Student',email:'demo@student.edu',id:'DEMO-STU',class:'9',section:'A',rollNo:1};
        currentUser={name:demoStu.name,email:demoStu.email,role:'student',id:demoStu.id,class:'9',section:'A',rollNo:1};
        localStorage.setItem('edutrack_session',JSON.stringify(currentUser));
        currentStep='dashboard';selectedTab='profile';render();
        showToast('Demo mode — backend offline');
      } else {
        showToast('Cannot reach server. Try demo: Class 9A, Roll 1, any password.');
        if(btn){btn.disabled=false;btn.textContent='Sign In →';}
      }
    }
  });

  // ── Staff & Parent login (Email → OTP) ────────────────────────────────────
  on('staff-login-btn','click',async function(){
    var email=(q('login-email')||{}).value.trim()||'';
    if(!email){showToast('Please enter your email address');return;}
    var btn=q('staff-login-btn');
    if(btn){btn.disabled=true;btn.textContent='Please wait…';}
    try {
      // Check if user exists in DB
      var dbUser=await loadUserFromDB(email);
      if(dbUser){
        // Existing user — send OTP for login
        otpMode='login';
        regData={name:dbUser.name,email:email,role:dbUser.role,uid:dbUser.id,schoolCode:dbUser.schoolCode||'',childId:dbUser.childId||''};
        var res2=await fetch(OTP_SERVER+'/api/otp/send',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({email:email,userName:dbUser.name}),
          signal:AbortSignal.timeout(8000)
        });
        var d2=await res2.json();
        if(d2.success){backendOnline=true;currentStep='otp';render();showToast('OTP sent to '+email);}
        else{showToast(d2.message||'Could not send OTP');}
      } else {
        // Check demo teachers
        var demoTch=DB.teachers.find(function(t){return t.email===email;});
        var demoReg=loadRegisteredUsers().find(function(u){return u.email===email;});
        if(demoTch){
          currentUser={name:demoTch.name,email:demoTch.email,role:'teacher',id:demoTch.id};
          localStorage.setItem('edutrack_session',JSON.stringify(currentUser));
          currentStep='dashboard';selectedTab='profile';render();
          showToast('Welcome back, '+demoTch.name+'! (demo)');
        } else if(demoReg){
          currentUser=demoReg;
          localStorage.setItem('edutrack_session',JSON.stringify(demoReg));
          currentStep='dashboard';selectedTab='profile';render();
          showToast('Welcome back, '+demoReg.name+'!');
        } else {
          showToast('Email not found. Contact your school admin, or create an account below.');
          if(btn){btn.disabled=false;btn.textContent='Send OTP →';}
        }
        return;
      }
    } catch(err) {
      backendOnline=false;
      // Offline demo fallback
      var demoTch2=DB.teachers.find(function(t){return t.email===email;});
      var demoReg2=loadRegisteredUsers().find(function(u){return u.email===email;});
      if(demoTch2){
        currentUser={name:demoTch2.name,email:demoTch2.email,role:'teacher',id:demoTch2.id};
        localStorage.setItem('edutrack_session',JSON.stringify(currentUser));
        currentStep='dashboard';selectedTab='profile';render();
        showToast('Demo mode (offline)');
      } else if(demoReg2){
        currentUser=demoReg2;
        localStorage.setItem('edutrack_session',JSON.stringify(demoReg2));
        currentStep='dashboard';selectedTab='profile';render();
        showToast('Welcome back (offline demo)');
      } else {
        otpMode='login';
        regData={name:'Demo User',email:email,role:'teacher',uid:'DEMO',schoolCode:'',childId:''};
        showToast('Server offline — Demo OTP: 482619');
        currentStep='otp';render();
      }
    } finally {
      if(btn){btn.disabled=false;btn.textContent='Send OTP →';}
    }
  });

  on('goto-register','click',function(){currentStep='register';render();});
  on('goto-login','click',function(){currentStep='login';render();});
  on('reg-next','click',async()=>{
    const name=(q('r-name')||{}).value||'';
    const email=(q('r-email')||{}).value||'';
    const role=(q('r-role')||{}).value||'';
    const childId=(q('r-childid')||{}).value.trim()||'';
    if(!name||!email||!role){showToast('Please fill all fields');return;}
    if(role==='parent'&&!childId){showToast("Please enter your child's Roll/Reg No.");return;}
    regData={name,email,uid:Date.now()+'-'+Math.random().toString(36).slice(2,7),role,schoolCode:'',childId:role==='parent'?childId:''};

    // Disable button and show loading
    const btn=q('reg-next');
    if(btn){btn.disabled=true;btn.textContent='Please wait…';}

    try {
      const res = await fetch(`${OTP_SERVER}/api/otp/send`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email, userName: name}),
        signal: AbortSignal.timeout(8000)
      });
      const data = await res.json();
      if(data.success){
        backendOnline = true;
        currentStep='otp';render();
        showToast('OTP sent to '+email);
      } else {
        showToast(data.message);
        if(btn){btn.disabled=false;btn.textContent='Continue →';}
      }
    } catch(err) {
      backendOnline = false;
      // Fallback: allow demo mode
      showToast('OTP server offline — Demo OTP: 482619');
      currentStep='otp';render();
      if(btn){btn.disabled=false;btn.textContent='Continue →';}
    }
  });

  on('resend-otp','click',async()=>{
    const btn=q('resend-otp');
    if(btn){btn.disabled=true;btn.textContent='Resending…';}
    try {
      const res = await fetch(`${OTP_SERVER}/api/otp/send`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email:regData.email, userName:regData.name}),
        signal: AbortSignal.timeout(8000)
      });
      const data = await res.json();
      showToast(data.success ? 'OTP resent to '+regData.email : data.message);
    } catch {
      showToast('Server offline — use demo OTP: 482619');
    }
    if(btn){btn.disabled=false;btn.textContent='Resend OTP';}
  });

  on('otp-verify','click',async()=>{
    const digits=[0,1,2,3,4,5].map(i=>(q('otp'+i)||{}).value||'').join('');
    if(digits.length<6){showToast('Please enter all 6 digits');return;}

    const btn=q('otp-verify');
    if(btn){btn.disabled=true;btn.textContent='Verifying…';}

    let verified = false;
    try {
      const res = await fetch(`${OTP_SERVER}/api/otp/verify`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email:regData.email, otp:digits}),
        signal: AbortSignal.timeout(8000)
      });
      const data = await res.json();
      if(data.success) {
        verified = true;
      } else {
        showToast(data.message);
      }
    } catch {
      // Fallback to demo OTP when server offline
      if(digits==='482619') {
        verified = true;
      } else {
        showToast('Server offline. Use demo OTP: 482619');
      }
    }

    if(verified){
      if(otpMode==='login'){
        // Login mode: just restore the DB user and go to dashboard
        var dbUserLogin=await loadUserFromDB(regData.email).catch(function(){return null;});
        var loginUser=dbUserLogin||{name:regData.name,email:regData.email,role:regData.role,id:regData.uid,schoolCode:regData.schoolCode,childId:regData.childId||''};
        currentUser=loginUser;
        localStorage.setItem('edutrack_session',JSON.stringify(loginUser));
        await loadAllDataFromServer().catch(function(){});
        currentStep='dashboard';selectedTab='profile';render();
        showToast('Welcome back, '+loginUser.name+'!');
        otpMode='register'; // reset
      } else {
        // Registration mode: create new user
        const newUser={name:regData.name,email:regData.email,role:regData.role,id:regData.uid,schoolCode:regData.schoolCode,childId:regData.childId||''};
        await saveRegisteredUser(newUser);
        currentUser=newUser;
        localStorage.setItem('edutrack_session', JSON.stringify(newUser));
        if(newUser.role==='student'){
          if(!DB.students.find(s=>s.email===newUser.email)){
            DB.students.push({name:newUser.name,email:newUser.email,id:newUser.id,class:'9',section:'A',rollNo:1,schoolCode:newUser.schoolCode||''});
          }
        }
        currentStep='dashboard';selectedTab='profile';render();
        showToast('Account verified! Welcome to EduTrack, '+regData.name+'!');
      }
    } else {
      if(btn){btn.disabled=false;btn.textContent='Verify & Continue →';}
    }
  });
  on('logout-btn','click',()=>{currentUser=null;currentStep='login';regData={};selectedTab='profile';selectedClass=null;selectedStudent=null;localStorage.removeItem('edutrack_session');render();});

  document.querySelectorAll('.nav-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      selectedTab=btn.dataset.tab;selectedClass=null;selectedStudent=null;
      const mc=document.querySelector('.main-content');
      if(mc)mc.innerHTML=renderTabContent();
      document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===selectedTab));
      attachTabEvents();
    });
  });

  document.querySelectorAll('.week-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      selectedWeek=btn.dataset.week;
      const mc=document.querySelector('.main-content');
      if(mc)mc.innerHTML=renderTabContent();
      attachTabEvents();
    });
  });

  attachTabEvents();

  document.querySelectorAll('.otp-digit').forEach((inp,i,arr)=>{
    inp.addEventListener('input',()=>{if(inp.value&&i<5)arr[i+1].focus();});
    inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!inp.value&&i>0)arr[i-1].focus();});
  });
}

      +'<div style="font-size:12px;color:var(--text3);margin-top:2px">'+m.sub+'</div></div>'

    formHtml='<div class="card" style="margin-top:20px;border:2px solid var(--brand)">'

var calViewYear=new Date().getFullYear();
var calViewMonth=new Date().getMonth();

function renderAcademicCalendar(){
  var today=new Date();
  var yr=calViewYear,mo=calViewMonth;
  var monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var moStr=yr+'-'+(mo+1<10?'0':'')+(mo+1);
  var firstDay=new Date(yr,mo,1).getDay();
  var daysInMonth=new Date(yr,mo+1,0).getDate();
  var daysInPrev=new Date(yr,mo,0).getDate();

  var headCells=dayNames.map(function(d){return '<div class="cal-head-cell">'+d+'</div>';}).join('');
  var cells='';
  for(var i=0;i<firstDay;i++){
    cells+='<div class="cal-day other-month"><div class="cal-day-num">'+(daysInPrev-firstDay+1+i)+'</div></div>';
  }
  for(var d=1;d<=daysInMonth;d++){
    var dateStr=yr+'-'+(mo+1<10?'0':'')+(mo+1)+'-'+(d<10?'0':'')+d;
    var isToday=(d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear());
    var dayEvs=ACADEMIC_CALENDAR.filter(function(e){return e.date===dateStr;});
    var evHtml=dayEvs.slice(0,2).map(function(e){
      return '<span class="cal-event-dot ev-'+e.type+'" title="'+e.title+'">'+e.title+'</span>';
    }).join('');
    if(dayEvs.length>2)evHtml+='<span style="font-size:9px;color:var(--text3)">+'+(dayEvs.length-2)+' more</span>';
    cells+='<div class="cal-day'+(isToday?' today':'')+'"><div class="cal-day-num">'+d+'</div>'+evHtml+'</div>';
  }
  var total=firstDay+daysInMonth;
  var nextFill=(total%7===0)?0:7-(total%7);
  for(var i=1;i<=nextFill;i++){
    cells+='<div class="cal-day other-month"><div class="cal-day-num">'+i+'</div></div>';
  }

  var now=new Date();now.setHours(0,0,0,0);
  var soon=new Date(now);soon.setDate(soon.getDate()+60);
  var upcoming=ACADEMIC_CALENDAR.filter(function(e){
    var dd=new Date(e.date);return dd>=now&&dd<=soon;
  }).sort(function(a,b){return a.date.localeCompare(b.date);});
  var upcomingHtml=upcoming.length?upcoming.map(function(e){
    var dd=new Date(e.date);
    var label=dd.toLocaleDateString('en-IN',{day:'numeric',month:'short',weekday:'short'});
    return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">'
      +'<div style="min-width:82px;font-size:12px;color:var(--text3)">'+label+'</div>'
      +'<span class="cal-event-dot ev-'+e.type+'" style="flex:1;overflow:visible;white-space:normal">'+e.title+'</span>'
    +'</div>';
  }).join(''):'<p style="color:var(--text3);font-size:13px;padding:16px 0">No events in the next 60 days</p>';

  var legendHtml='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">'
    +'<span class="cal-event-dot ev-exam" style="padding:4px 10px">Exam</span>'
    +'<span class="cal-event-dot ev-holiday" style="padding:4px 10px">Holiday</span>'
    +'<span class="cal-event-dot ev-event" style="padding:4px 10px">Event</span>'
    +'<span class="cal-event-dot ev-ptm" style="padding:4px 10px">PTM</span>'
    +'<span class="cal-event-dot ev-break" style="padding:4px 10px">Break</span>'
  +'</div>';

  return '<div class="section-header" style="margin-bottom:4px">'
    +'<div><div class="section-title">Academic Calendar 2025–26</div>'
    +'<div class="section-sub">Exams, holidays, events and PTM schedule</div></div>'
  +'</div>'
  +legendHtml
  +'<div style="display:grid;grid-template-columns:1fr 290px;gap:18px;align-items:start">'
    +'<div class="card">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
        +'<button class="btn-ghost" id="cal-prev" style="font-size:18px;padding:4px 12px">←</button>'
        +'<span style="font-weight:700;font-size:15px">'+monthNames[mo]+' '+yr+'</span>'
        +'<button class="btn-ghost" id="cal-next" style="font-size:18px;padding:4px 12px">→</button>'
      +'</div>'
      +'<div class="cal-grid">'+headCells+'</div>'
      +'<div class="cal-grid" style="margin-top:3px">'+cells+'</div>'
    +'</div>'
    +'<div class="card" style="max-height:520px;overflow-y:auto">'
      +'<div style="font-weight:700;font-size:14px;margin-bottom:10px">Upcoming (60 days)</div>'
      +upcomingHtml
    +'</div>'
  +'</div>';
}

      addStuBtn.disabled=true;addStuBtn.textContent='Saving to database…';

      // ── Step 1: Create student record in DB ─────────────────────────────────
      var newId='STU-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
      var stuRes,stuData;

        });

      if(!stuRes.ok){

      classStudents.forEach(function(s){
        var att=DB.attendance[s.id]||s.attendance||{};
        // Look for date-keyed or week-keyed entry
        Object.keys(att).forEach(function(wk){
          if(att[wk]&&att[wk][tchAttDate]){
            tchAttRecord[s.id]=att[wk][tchAttDate];
          }
        });
      });
      var mc=document.querySelector('.main-content');
      if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}
    });
  });

  // Present / Absent / Late toggle buttons
  document.querySelectorAll('.tch-att-status').forEach(function(btn){
    btn.addEventListener('click',function(){
      var sid=btn.getAttribute('data-stuid');
      var status=btn.getAttribute('data-status');
      // Toggle off if already selected
      if(tchAttRecord[sid]===status) delete tchAttRecord[sid];
      else tchAttRecord[sid]=status;
      var mc=document.querySelector('.main-content');
      if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}
    });
  });

  // Mark All Present
  on('tch-mark-all-present','click',function(){
    var classStudents=DB.students.filter(function(s){return (s.class+s.section)===tchAttClass;});
    classStudents.forEach(function(s){tchAttRecord[s.id]='present';});
    var mc=document.querySelector('.main-content');
    if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}
  });

  // Save attendance
  on('tch-save-attendance','click',async function(){
    var btn=document.getElementById('tch-save-attendance');
    var msg=document.getElementById('tch-att-save-msg');
    if(btn){btn.disabled=true;btn.textContent='Submitting…';}
    var classStudents=DB.students.filter(function(s){return (s.class+s.section)===tchAttClass;});
    var saved=0,failed=0;
    for(var i=0;i<classStudents.length;i++){
      var s=classStudents[i];
      var status=tchAttRecord[s.id]||'absent';
      // Save into local DB.attendance immediately
      if(!DB.attendance[s.id])DB.attendance[s.id]={};
      var wkLabel='Date:'+tchAttDate;
      if(!DB.attendance[s.id][wkLabel])DB.attendance[s.id][wkLabel]={};
      DB.attendance[s.id][wkLabel][tchAttDate]=status;
      // Also try to persist to backend
      try{
        await fetch(OTP_SERVER+'/api/db/attendance',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({studentId:s.id,week:wkLabel,day:tchAttDate,status:status}),
          signal:AbortSignal.timeout(4000)
        });
        saved++;
      }catch(e){failed++;}
    }
    if(btn){btn.disabled=false;btn.textContent='Submit';}
    // Format date as DD/MM/YYYY
    var parts=tchAttDate.split('-');
    var formattedDate=parts[2]+'/'+parts[1]+'/'+parts[0];
    var confirmMsg=formattedDate+' attendance submitted';
    if(msg){msg.textContent='✓ '+confirmMsg;msg.style.display='inline';setTimeout(function(){msg.style.display='none';},4000);}
    showToast(confirmMsg);
  });

  // ── ADMIN EVENTS ────────────────────────────────────────────────────────────
  var isAdmin=currentUser&&currentUser.role==='admin';
  if(isAdmin){
    // Quick-action buttons on Dashboard
    on('admin-quick-add-student','click',function(){selectedTab='add_student';var mc=document.querySelector('.main-content');if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}});
    on('admin-quick-view-students','click',function(){selectedTab='manage_students';var mc=document.querySelector('.main-content');if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}});
    on('admin-quick-view-teachers','click',function(){selectedTab='manage_teachers';var mc=document.querySelector('.main-content');if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}});

    // Add Student form
    on('adm-add-stu-btn','click',async function(){
      var name=(q('adm-stu-name')||{}).value.trim()||'';
      var cls=(q('adm-stu-class')||{}).value||'';
      var sec=(q('adm-stu-section')||{}).value||'';
      var roll=parseInt((q('adm-stu-roll')||{}).value||'0')||0;
      var pass=(q('adm-stu-pass')||{}).value||'';
      var email=(q('adm-stu-email')||{}).value.trim()||'';
      var regid=(q('adm-stu-regid')||{}).value.trim()||'';
      if(!name||!cls||!sec||!roll||!pass){showToast('Please fill Name, Class, Section, Roll No and Password');return;}
      var btn=q('adm-add-stu-btn');if(btn){btn.disabled=true;btn.textContent='Saving…';}
      try{
        var newId=regid||('STU-'+Date.now());
        var stuRes=await fetch(OTP_SERVER+'/api/db/students',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({id:newId,name:name,email:email||null,className:cls,section:sec.toUpperCase(),rollNo:roll,schoolCode:''}),
          signal:AbortSignal.timeout(8000)
        });
        var stuData=await stuRes.json();
        if(!stuData.success){showToast('Error: '+(stuData.message||'Could not save student'));if(btn){btn.disabled=false;btn.textContent='Save Student →';}return;}
        var savedId=stuData.id||newId;
        // Set password
        var passRes=await fetch(OTP_SERVER+'/api/auth/set-password',{
          method:'PUT',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({userId:savedId,password:pass}),
          signal:AbortSignal.timeout(8000)
        });
        var passData=await passRes.json();
        if(!passData||!passData.success){showToast(name+' saved but password NOT set. Use Reset Password.');if(btn){btn.disabled=false;btn.textContent='Save Student →';}return;}
        DB.students.push({id:savedId,name:name,email:email,class:cls,section:sec.toUpperCase(),rollNo:roll,schoolCode:'',marks:{}});
        showToast(name+' added! Login: Class '+cls+sec.toUpperCase()+', Roll '+roll);
        if(btn){btn.disabled=false;btn.textContent='Save Student →';}
        // Clear form
        ['adm-stu-name','adm-stu-regid','adm-stu-roll','adm-stu-pass','adm-stu-email'].forEach(function(id){var el=q(id);if(el)el.value='';});
        var mc=document.querySelector('.main-content');if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}
      }catch(e){
        showToast('Network error: '+e.message);
        if(btn){btn.disabled=false;btn.textContent='Save Student →';}
      }
    });

    // Manage Students — search/filter live update
    var admSearch=q('adm-stu-search');
    if(admSearch){
      admSearch.addEventListener('input',function(){
        window._adminStuSearch=this.value;
        var mc=document.querySelector('.main-content');if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}
      });
    }
    var admFilter=q('adm-stu-filter-class');
    if(admFilter){
      admFilter.addEventListener('change',function(){
        window._adminStuClass=this.value;
        var mc=document.querySelector('.main-content');if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}
      });
    }
    // Remove student buttons
    document.querySelectorAll('[data-del-stu]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var sid=btn.getAttribute('data-del-stu');
        if(!confirm('Remove this student? This cannot be undone.'))return;
        DB.students=DB.students.filter(function(s){return s.id!==sid;});
        showToast('Student removed (local). Restart server to sync DB.');
        var mc=document.querySelector('.main-content');if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}
      });
    });

    // Notices — post
    on('adm-post-notice-btn','click',async function(){
      var title=(q('adm-notice-title')||{}).value.trim()||'';
      var cls=(q('adm-notice-class')||{}).value||'';
      var desc=(q('adm-notice-desc')||{}).value.trim()||'';
      if(!title){showToast('Please enter a notice title');return;}
      var btn=q('adm-post-notice-btn');if(btn){btn.disabled=true;btn.textContent='Posting…';}
      try{
        var res=await fetch(OTP_SERVER+'/api/db/assignments',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({id:'NOTICE-'+Date.now(),type:'notice',title:title,subject:'',targetClass:cls,dueDate:'',description:desc,teacherName:'Admin'}),
          signal:AbortSignal.timeout(8000)
        });
        var d=await res.json();
        if(d.success){ASSIGNMENTS.unshift({type:'notice',title:title,targetClass:cls,description:desc,teacherName:'Admin',postedAt:new Date().toISOString()});showToast('Notice posted!');}
        else{showToast(d.message||'Could not post notice');}
      }catch(e){showToast('Offline — notice not saved to DB');}
      if(btn){btn.disabled=false;btn.textContent='Post Notice';}
      var mc=document.querySelector('.main-content');if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}
    });

    // Fee search
    on('adm-fee-search-btn','click',function(){
      var term=(q('adm-fee-search')||{}).value.trim().toLowerCase()||'';
      var result=q('adm-fee-result');if(!result)return;
      if(!term){result.innerHTML='';return;}
      var found=DB.students.filter(function(s){return s.name.toLowerCase().indexOf(term)>-1||String(s.rollNo)===term;});
      if(!found.length){result.innerHTML='<div style="color:var(--text3);font-size:13px">No student found matching "'+term+'"</div>';return;}
      result.innerHTML=found.map(function(s){
        return '<div style="padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">'
          +'<div><div style="font-weight:700;font-size:13px">'+s.name+'</div><div style="font-size:11px;color:var(--text3)">Class '+s.class+' '+s.section+' · Roll '+s.rollNo+'</div></div>'
          +'<span style="background:var(--danger-bg);color:var(--danger);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600">₹18,350 Due</span>'
        +'</div>';
      }).join('');
    });

    // System actions
    on('adm-check-health-btn','click',function(){checkBackendHealth();showToast('Checking server health…');});
    on('adm-reload-data-btn','click',async function(){
      showToast('Reloading data from server…');
      await loadAllDataFromServer();
      var mc=document.querySelector('.main-content');if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}
      showToast('Data reloaded!');
    });
  }

  // ── PAYMENT METHOD CARDS ────────────────────────────────────────────────────
  document.querySelectorAll('.pay-method-card').forEach(function(card){
    card.addEventListener('click',function(){
      paymentMethod=card.getAttribute('data-method');
      var mc=document.querySelector('.main-content');
      if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}
    });
  });

  // Payment form submit
  var paySubmitBtn=document.getElementById('pay-submit-btn');
  if(paySubmitBtn){
    paySubmitBtn.addEventListener('click',function(){
      var stuName=(document.getElementById('pay-stu-name')||{}).value||'';
      var parentName=(document.getElementById('pay-parent-name')||{}).value||'';
      var cls=(document.getElementById('pay-class')||{}).value||'';
      var sec=(document.getElementById('pay-section')||{}).value||'';
      var installment=(document.getElementById('pay-installment')||{}).value||'';
      var amount=(document.getElementById('pay-amount')||{}).value||'';
      stuName=stuName.trim();parentName=parentName.trim();
      if(!stuName||!parentName||!cls||!sec||!installment||!amount){
        showToast('Please fill all payment details.');return;
      }
      var methodLabel=paymentMethod==='upi'?'UPI':paymentMethod==='netbanking'?'Net Banking':paymentMethod==='card'?'Card':'Cheque/DD';
      // Method-specific field validation
      if(paymentMethod==='upi'){
        var upiId=(document.getElementById('pay-upi-id')||{}).value||'';
        if(!upiId.trim()||upiId.indexOf('@')===-1){showToast('Please enter a valid UPI ID (e.g. name@upi).');return;}
      } else if(paymentMethod==='netbanking'){
        var bank=(document.getElementById('pay-bank')||{}).value||'';
        if(!bank){showToast('Please select your bank.');return;}
      } else if(paymentMethod==='card'){
        var cardNo=(document.getElementById('pay-card-no')||{}).value||'';
        if(cardNo.replace(/\s/g,'').length<16){showToast('Please enter a valid 16-digit card number.');return;}
      } else if(paymentMethod==='cheque'){
        var chequeNo=(document.getElementById('pay-cheque-no')||{}).value||'';
        if(!chequeNo.trim()){showToast('Please enter the cheque/DD number.');return;}
      }
      showToast('Payment of ₹'+parseInt(amount).toLocaleString('en-IN')+' initiated via '+methodLabel+'! You will receive a confirmation SMS shortly.');
      paymentMethod=null;
      var mc=document.querySelector('.main-content');
      if(mc){mc.innerHTML=renderTabContent();attachTabEvents();}
    });
  }
}


render();
checkBackendHealth();
tryAutoLogin();
</script>
</body>
</html>
